const NOTES = `
<div class="card">
  <h2>📖 1.1 因式分解 — 核心概念</h2>
  <p class="muted">F.3 Chapter 1: More about Factorization of Polynomials</p>
</div>
<div class="card">
  <h3>一、核心術語定義</h3>
  <table>
    <tr><th>英文</th><th>中文</th><th>定義</th></tr>
    <tr><td>Factorization</td><td>因式分解</td><td>將一個多項式寫成其因式連乘積的過程。</td></tr>
    <tr><td>Taking out common factors</td><td>提出公因式</td><td>若各項有相同因式，把該公因式提取出來。</td></tr>

<div class="card">
  <h3>二、所有公式 / 法則</h3>
  <table>
    <tr><th>名稱</th><th>公式</th><th>使用條件</th></tr>
    <tr><td>提出公因式</td><td>$ax + 3x = x(a+3)$</td><td>當所有項含相同變數或數字時。</td></tr>
    <tr><td>併項法</td><td>$ax+3x+ay+3y = (a+3)(x+y)$</td><td>4 項或以上，無全局公因式但局部有。</td></tr>
    <tr><td>平方差</td><td>$a^2-b^2=(a+b)(a-b)$</td><td>兩項皆完全平方，中間為減號。</td></tr>
    <tr><td>完全平方(和)</td><td>$a^2+2ab+b^2=(a+b)^2$</td><td>三項，首尾為正完全平方，中間 $+2ab$。</td></tr>
    <tr><td>完全平方(差)</td><td>$a^2-2ab+b^2=(a-b)^2$</td><td>三項，首尾為正完全平方，中間 $-2ab$。</td></tr>
  </table>
</div>
<div class="card">

  <h4>基本方法 (Basic Methods)</h4>
  <p>• <b>提出公因式</b>：所有情況嘅第一步檢查。<br>• <b>併項法</b>：專門針對 4 項或 6 項嘅長多項式。</p>
  <h4>恆等式 (Using Identities)</h4>
  <p>• <b>平方差</b>：針對二項式。<br>• <b>完全平方</b>：針對特定嘅三項式。</p>
</div>
<div class="card">
  <h3>四、Common Mistakes（常見錯誤）</h3>
  <div class="warn"><b>1. 未完成最終分解：</b>提出括號公因式後，忘記括號內仍有數字公因數。例如算到 $(4a-3b)(2a+4b)$ 就停，正確應為 $2(4a-3b)(a+2b)$。做完習慣性再掃一次每個括號。</div>
  <div class="warn"><b>2. 平方差展開忘記變號：</b>$A^2-(B-C)^2$ 錯寫成 $(A+B-C)(A-B-C)$。減去括號時要變號 $[A-(B-C)]=A-B+C$。</div>

<div class="card">

</div>
`;

const EXAMPLES = `
<div class="card"><h2>📝 課本例題 (Example 1.1–1.7)</h2><p class="muted">M1/A1 為導師標示，非官方 marking scheme。</p></div>

<div class="card"><h3>Example 1.1</h3><p class="quiz-q">Factorize (a) $4x^2+8x$ (b) $x^3-x^2y+5x^2$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a) Step 1：</b>$4x^2+8x=4x(x)+4x(2)$（觀察最大公因式為 $4x$）</div>
<div class="stepbox"><b>(a) Step 2：</b>$=4x(x+2)$【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$x^3-x^2y+5x^2=x^2(x)-x^2(y)+x^2(5)$（最大公因式 $x^2$）</div>
<div class="stepbox"><b>(b) Step 2：</b>$=x^2(x-y+5)$【A1】</div>
<p class="tip">最省時：直接寫出第 2 步。</p></div></div>

<div class="card"><h3>Example 1.2</h3><p class="quiz-q">Factorize (a) $k(x-1)+2(x-1)$ (b) $(4a-3b)(6a+b)-(4a-3b)^2$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a)：</b>$k(x-1)+2(x-1)=(x-1)(k+2)$（將 $(x-1)$ 視為整體公因式提出）【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$=(4a-3b)[(6a+b)-(4a-3b)]$（提出公因式 $(4a-3b)$）【M1】</div>
<div class="stepbox"><b>(b) Step 2：</b>$=(4a-3b)(6a+b-4a+3b)$（展開括號內）</div>
<div class="stepbox"><b>(b) Step 3：</b>$=(4a-3b)(2a+4b)$（化簡括號）</div>
<div class="stepbox"><b>(b) Step 4：</b>$=2(4a-3b)(a+2b)$（再提出公因式 2）【A1】</div>
<p class="warn">最後一步必須抽出 2，學生極易忽略！</p></div></div>

<div class="card"><h3>Example 1.3</h3><p class="quiz-q">Factorize (a) $4m-4n+km-kn$ (b) $3pr-8qs-4qr+6ps$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a) Step 1：</b>$4m-4n+km-kn=4(m-n)+k(m-n)$（前後兩項分別提公因式）【M1】</div>
<div class="stepbox"><b>(a) Step 2：</b>$=(m-n)(4+k)$（提出共同括號 $(m-n)$）【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$=3pr-4qr+6ps-8qs$（重排，含 $r$、含 $s$ 各放一起）</div>
<div class="stepbox"><b>(b) Step 2：</b>$=r(3p-4q)+2s(3p-4q)$（分組提出 $r$ 及 $2s$）【M1】</div>
<div class="stepbox"><b>(b) Step 3：</b>$=(3p-4q)(r+2s)$（提出共同括號）【A1】</div>
<p class="tip">必須先重排，否則無法分組。</p></div></div>

<div class="card"><h3>Example 1.4</h3><p class="quiz-q">Factorize $1-2x-3y+y^2-2xy^2-3y^3$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>方法二 Step 1：</b>$=(1-2x-3y)+y^2(1-2x-3y)$（前三項一組，後三項抽 $y^2$）【M1】</div>
<div class="stepbox"><b>方法二 Step 2：</b>$=(1-2x-3y)(1+y^2)$【A1】</div>
<p class="tip">強烈建議用方法二：只需將多項式一分為二，比方法一更直觀省時。</p></div></div>

<div class="card"><h3>Example 1.5</h3><p class="quiz-q">Factorize (a) $16m^2-25n^2$ (b) $-3m^2+12$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a) Step 1：</b>$16m^2-25n^2=(4m)^2-(5n)^2$（整理為 $a^2-b^2$）</div>
<div class="stepbox"><b>(a) Step 2：</b>$=(4m+5n)(4m-5n)$（平方差公式）【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$-3m^2+12=3(4-m^2)$（先提公因式 3）【M1】</div>
<div class="stepbox"><b>(b) Step 2：</b>$=3(2^2-m^2)$（整理為 $a^2-b^2$）</div>
<div class="stepbox"><b>(b) Step 3：</b>$=3(2+m)(2-m)$（平方差公式）【A1】</div>
<p class="tip">必須先提公因式。</p></div></div>

<div class="card"><h3>Example 1.6</h3><p class="quiz-q">Factorize (a) $x^2-18x+81$ (b) $-7x^2-28xy-28y^2$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a) Step 1：</b>$x^2-18x+81=x^2-2(x)(9)+9^2$（整理為 $a^2-2ab+b^2$）</div>
<div class="stepbox"><b>(a) Step 2：</b>$=(x-9)^2$（完全平方公式）【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$-7x^2-28xy-28y^2=-7[x^2+4xy+4y^2]$（先提公因式 $-7$）【M1】</div>
<div class="stepbox"><b>(b) Step 2：</b>$=-7[x^2+2(x)(2y)+(2y)^2]$（整理括號內）</div>
<div class="stepbox"><b>(b) Step 3：</b>$=-7(x+2y)^2$（完全平方公式）【A1】</div></div></div>

<div class="card"><h3>Example 1.7</h3><p class="quiz-q">Factorize (a) $36-(3x-2y)^2$ (b) $(4-k)^2+10(4-k)+25$</p>
<button class="toggle-btn" onclick="tgAns(this)">顯示解答</button>
<div class="answer" style="display:none">
<div class="stepbox"><b>(a) Step 1：</b>$36-(3x-2y)^2=6^2-(3x-2y)^2$（整理為 $a^2-b^2$，$a=6,b=3x-2y$）</div>

<div class="stepbox"><b>(a) Step 3：</b>$=(6+3x-2y)(6-3x+2y)$（小心負號展開）【A1】</div>
<div class="stepbox"><b>(b) Step 1：</b>$=(4-k)^2+2(4-k)(5)+5^2$（整理為 $a^2+2ab+b^2$，$a=4-k,b=5$）</div>
<div class="stepbox"><b>(b) Step 2：</b>$=[(4-k)+5]^2$（完全平方公式）【M1】</div>
<div class="stepbox"><b>(b) Step 3：</b>$=(9-k)^2$（化簡括號）【A1】</div></div></div>
`;
const PRACTICE = `

const SKEY = "dse_ch11_srs";
let CUR = "notes";
function loadSRS(){ try { return JSON.parse(localStorage.getItem(SKEY)) || {}; } catch(e){ return {}; } }
function saveSRS(d){ localStorage.setItem(SKEY, JSON.stringify(d)); }
function rate(id, quality){
  const srs = loadSRS(); const now = Date.now();
  let card = srs[id] || { ease:2.5, interval:0, reps:0, due:now };
  if (quality < 3){ card.reps = 0; card.interval = 1; }
  else {
    card.reps += 1;
    if (card.reps === 1) card.interval = 1;
    else if (card.reps === 2) card.interval = 3;
    else card.interval = Math.round(card.interval * card.ease);
    card.ease = Math.max(1.3, card.ease + (0.1 - (5-quality)*(0.08 + (5-quality)*0.02)));
  }
  card.due = now + card.interval * 86400000;
  srs[id] = card; saveSRS(srs); renderView(CUR);
}
function dueList(){ const srs = loadSRS(); const now = Date.now();
  return QUIZ.filter(q => { const c = srs[q.id]; return c && c.due <= now; }); }
function progress(){ const srs = loadSRS();
  const learned = QUIZ.filter(q => srs[q.id] && srs[q.id].reps > 0).length;
  return { learned, total: QUIZ.length }; }

function tgAns(btn){
  const ans = btn.parentElement.querySelector(".answer") || btn.nextElementSibling;
  if (!ans) return;
  const show = ans.style.display === "none" || ans.style.display === "";
  ans.style.display = show ? "block" : "none";
  if (btn.textContent.indexOf("解答") >= 0) btn.textContent = show ? "隱藏解答" : "顯示解答";
  else btn.textContent = show ? "隱藏答案" : "顯示答案";
}

function quizCard(q){
  const levelName = { easy:"淺", mid:"中", hard:"深" }[q.level] || q.level;
  const stepsHtml = q.steps.map((s,i)=>
    `<div class="stepbox"><b>Step ${i+1}：</b>${s}</div>`).join("");
  return `
  <div class="card quiz-card">
    <div class="quiz-head">
      <span class="tag tag-${q.level}">${levelName}</span>
      <span class="tag">${q.tag}</span>
      <span class="muted">#${q.id}</span>
    </div>
    <div class="quiz-q">${q.q}</div>
    <button class="toggle-btn" onclick="tgAns(this)">顯示答案</button>
    <div class="answer" style="display:none">
      <p><b>答案：</b>${q.a}</p>
      <p><b>詳細步驟：</b></p>
      ${stepsHtml}
      <p class="mistake"><b>易錯：</b>${q.mistake}</p>
      <div class="rate-row">
        <span class="muted">掌握程度：</span>
        <button class="rate-btn r-bad" onclick="rate(${q.id},1)">😵 唔識</button>
        <button class="rate-btn r-mid" onclick="rate(${q.id},3)">🤔 一般</button>
        <button class="rate-btn r-good" onclick="rate(${q.id},5)">😎 熟練</button>
      </div>
    </div>
  </div>`;
}

function viewQuiz(){
  const p = progress();
  const pct = p.total ? Math.round(p.learned / p.total * 100) : 0;
  const head = `<div class="card"><h2>🎯 測驗 — Exercise 1.1（共 ${p.total} 題）</h2>
    <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
    <p class="muted">已練習 ${p.learned} / ${p.total} 題（${pct}%）</p></div>`;
  return head + QUIZ.map(quizCard).join("");
}
function viewReview(){
  const due = dueList();
  const head = `<div class="card"><h2>📅 今日複習</h2><p class="muted">根據你嘅評分，以下題目今日需要複習。</p></div>`;
  if (due.length === 0)
    return head + `<div class="card"><p class="tip">🎉 太好喇！今日冇需要複習嘅題目。去「測驗」練多啲啦！</p></div>`;
  return head + due.map(quizCard).join("");
}

function renderView(view){
  CUR = view;
  const main = document.getElementById("content");
  let html = "";
  switch(view){
    case "notes": html = NOTES; break;
    case "examples": html = EXAMPLES; break;
    case "practice": html = PRACTICE; break;
    case "formula": html = FORMULA; break;
    case "quiz": html = viewQuiz(); break;
    case "review": html = viewReview(); break;
    default: html = NOTES;
  }
  main.innerHTML = html;
  document.querySelectorAll(".menu-item").forEach(el=>{
    el.classList.toggle("active", el.dataset.view === view);
  });
  if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([main]).catch(()=>{});
  closeMenu();
  window.scrollTo(0,0);
}

function openMenu(){
  document.getElementById("sidebar").classList.add("open");
  document.getElementById("overlay").classList.add("show");
}
function closeMenu(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}
function setL(lang){
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.classList.toggle("active", b.dataset.lang === lang);
  });
}

window.addEventListener("load", function(){
  document.querySelectorAll(".menu-item").forEach(el=>{
    el.addEventListener("click", ()=> renderView(el.dataset.view));
  });
  document.querySelectorAll(".lang-btn").forEach(b=>{
    b.addEventListener("click", ()=> setL(b.dataset.lang));
  });
  renderView("notes");
});
</script>
